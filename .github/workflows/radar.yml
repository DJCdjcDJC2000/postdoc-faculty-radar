name: Career Radar

on:
  push:
    branches:
      - main
  schedule:
    - cron: "7 1 * * 1"
    - cron: "17 1 * * 0,2-6"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: career-radar
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_BOT_APP_ID: ${{ secrets.FEISHU_BOT_APP_ID }}
      FEISHU_BOT_APP_SECRET: ${{ secrets.FEISHU_BOT_APP_SECRET }}
      FEISHU_BOT_RECEIVE_ID: ${{ secrets.FEISHU_BOT_RECEIVE_ID }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      DEEPSEEK_MAX_ITEMS: ${{ vars.DEEPSEEK_MAX_ITEMS || '12' }}
      DEEPSEEK_MAX_ACADEMIC_PROFILES: ${{ vars.DEEPSEEK_MAX_ACADEMIC_PROFILES || '6' }}
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test
      - name: Select update mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event.schedule }}" == "7 1 * * 1" ]]; then
            echo "FULL_UPDATE=true" >> "$GITHUB_ENV"
          else
            echo "FULL_UPDATE=false" >> "$GITHUB_ENV"
          fi
      - name: Weekly full update
        if: ${{ env.FULL_UPDATE == 'true' }}
        run: npm run update:weekly
      - name: Refresh OpenAlex profiles when a free API key is configured
        if: ${{ env.FULL_UPDATE == 'true' && env.OPENALEX_API_KEY != '' }}
        run: |
          node scripts/enrich-academic-openalex.mjs --explicit-only --output output/research/openalex-explicit-academic.json
          npm run materialize:academic:openalex
          npm run verify:academic:authors
          npm run build:public
          npm run report:weekly
      - name: Daily lightweight update
        if: ${{ env.FULL_UPDATE != 'true' && github.event_name != 'push' }}
        run: npm run update:light
      - name: Build pushed revision
        if: ${{ github.event_name == 'push' }}
        run: npm run build:public
      - name: Generate calendar reports
        if: ${{ github.event_name != 'push' }}
        shell: bash
        run: |
          day="$(date -u +%d)"
          month="$(date -u +%m)"
          echo "MONTHLY_REPORT=false" >> "$GITHUB_ENV"
          echo "QUARTERLY_REPORT=false" >> "$GITHUB_ENV"
          echo "ANNUAL_REPORT=false" >> "$GITHUB_ENV"
          if [[ "$day" == "01" ]]; then
            npm run report:monthly
            echo "MONTHLY_REPORT=true" >> "$GITHUB_ENV"
          fi
          if [[ "$day" == "01" && "$month" =~ ^(01|04|07|10)$ ]]; then
            npm run report:quarterly
            echo "QUARTERLY_REPORT=true" >> "$GITHUB_ENV"
          fi
          if [[ "$day" == "01" && "$month" == "01" ]]; then
            npm run report:annual
            echo "ANNUAL_REPORT=true" >> "$GITHUB_ENV"
          fi
          if [[ "$day" == "01" ]]; then npm run build:public; fi
      - run: npm run validate
      - run: npm run verify:acceptance
      - name: Notify weekly Feishu report
        if: ${{ env.FULL_UPDATE == 'true' && (env.FEISHU_WEBHOOK_URL != '' || (env.FEISHU_BOT_APP_ID != '' && env.FEISHU_BOT_APP_SECRET != '' && env.FEISHU_BOT_RECEIVE_ID != '')) }}
        run: npm run notify:weekly
      - name: Notify calendar Feishu reports
        if: ${{ (env.MONTHLY_REPORT == 'true' || env.QUARTERLY_REPORT == 'true' || env.ANNUAL_REPORT == 'true') && (env.FEISHU_WEBHOOK_URL != '' || (env.FEISHU_BOT_APP_ID != '' && env.FEISHU_BOT_APP_SECRET != '' && env.FEISHU_BOT_RECEIVE_ID != '')) }}
        shell: bash
        run: |
          if [[ "$MONTHLY_REPORT" == "true" ]]; then npm run notify:monthly; fi
          if [[ "$QUARTERLY_REPORT" == "true" ]]; then npm run notify:quarterly; fi
          if [[ "$ANNUAL_REPORT" == "true" ]]; then npm run notify:annual; fi
      - name: Create or update weekly GitHub report
        if: ${{ env.FULL_UPDATE == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('data/generated/weekly-report.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            const title = `职业雷达周报 · ${date}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            const existing = issues.find((issue) => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                state: 'open'
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
      - name: Create calendar GitHub reports
        if: ${{ env.MONTHLY_REPORT == 'true' || env.QUARTERLY_REPORT == 'true' || env.ANNUAL_REPORT == 'true' }}
        uses: actions/github-script@v7
        env:
          REPORT_MONTHLY: ${{ env.MONTHLY_REPORT }}
          REPORT_QUARTERLY: ${{ env.QUARTERLY_REPORT }}
          REPORT_ANNUAL: ${{ env.ANNUAL_REPORT }}
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().slice(0, 10);
            const reports = [
              ['monthly', '月报', process.env.REPORT_MONTHLY],
              ['quarterly', '季度报告', process.env.REPORT_QUARTERLY],
              ['annual', '年度报告', process.env.REPORT_ANNUAL]
            ];
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            for (const [kind, label, enabled] of reports) {
              if (enabled !== 'true') continue;
              const body = fs.readFileSync(`data/generated/${kind}-report.md`, 'utf8');
              const title = `职业雷达${label} · ${date}`;
              const existing = issues.find((issue) => !issue.pull_request && issue.title === title);
              if (existing) {
                await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body, state: 'open' });
              } else {
                await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
              }
            }
      - name: Commit generated data
        if: ${{ github.event_name != 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated data/ai data/research/academic-candidates.json data/research/academic-enrichment.json data/research/academic-identifier-discoveries.json data/research/academic-orcid-search-discoveries.json data/research/academic-orcid-crosscheck-discoveries.json data/research/orcid-academic-enrichment.json data/research/industry-people-curated.json public
          git diff --cached --quiet || git commit -m "chore: update radar data"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
