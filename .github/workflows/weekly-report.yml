name: Weekly Career Radar Report

on:
  schedule:
    - cron: "10 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:public
      - name: Notify weekly Feishu report
        if: ${{ env.FEISHU_WEBHOOK_URL != '' }}
        run: npm run notify:weekly
